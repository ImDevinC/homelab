apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: dns-duration
  namespace: argo-cd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  destination:
    server: https://kubernetes.default.svc
    namespace: dns-duration
  project: default
  source:
    path: charts/dns-duration
    repoURL: git@git.int.imdevinc.com:ImDevinC/homelab.git
    targetRevision: HEAD
  syncPolicy:
    syncOptions:
      - CreateNamespace=true
    automated: 
