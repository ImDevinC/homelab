#apiVersion: postgresql.cnpg.io/v1
#kind: Database
#metadata:
#  name: pr-queue
#spec:
#  name: pr-queue
#  owner: pr-queue
#  cluster:
#    name: postgres
---
apiVersion: postgresql.cnpg.io/v1
kind: DatabaseRole
metadata:
  name: pr-queue
spec:
  cluster:
    name: postgres
  name: pr-queue
  login: true
  superuser: false
  databaseRoleReclaimPolicy: delete
  passwordSecret:
    name: pr-queue-database-password
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: pr-queue-database-password
  namespace: postgres
spec:
  encryptedData:
    password: 
    username: 
  template:
    metadata:
      labels:
        cnpg.io/reload: "true"
      name: pr-queue-database-password
      namespace: postgres
    type: kubernetes.io/basic-auth
