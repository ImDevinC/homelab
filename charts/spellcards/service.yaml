apiVersion: v1
kind: Service
metadata:
  labels:
    service: spellcards
  name: spellcards
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 80
  selector:
    service: spellcards
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Homelab
    gethomepage.dev/icon: mdi-cards-outline
    gethomepage.dev/name: Spellcards
  name: spellcards
spec:
  hostnames:
    - spellcards.int.imdevinc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: spellcards
          namespace: spellcards
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: spellcards
    service: spellcards
  name: spellcards
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: spellcards
      service: spellcards
  template:
    metadata:
      labels:
        app.kubernetes.io/name: spellcards
        service: spellcards
    spec:
      securityContext:
        fsGroup: 101
      containers:
        - name: spellcards
          image: ghcr.io/imdevinc/spellcards
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 80
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
          securityContext:
            runAsUser: 101
            runAsGroup: 101
      restartPolicy: Always
