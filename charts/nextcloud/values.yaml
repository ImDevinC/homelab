nextcloud:
  ingress:
    enabled: true
    className: nginx
  nextcloud:
    host: nextcloud.collins.home
    existingSecret:
      enabled: true
      secretName: nextcloud-creds
      usernameKey: username
      passwordKey: password
    securityContext:
      runAsUser: 1000
      runAsGroup: 1000
  service:
    type: LoadBalancer
  persistence:
    enabled: true
    annotations:
      nfs.io/storage-path: nextcloud
    storageClass: nfs-client
  livenessProbe:
    enabled: false
  readinessProbe:
    enabled: false
  rbac:
    enabled: true
  metrics:
    enabled: truegid
    serviceMonitor:
      enabled: true