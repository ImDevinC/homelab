apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: runner-secret
  namespace: forgejo
spec:
  encryptedData:
    runner-uuid: 
    token: 
  template:
    metadata:
      name: runner-secret
      namespace: forgejo
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: forgejo-runner
  labels:
    app: forgejo-runner
    app.kubernetes.io/component: forgejo-runner
    app.kubernetes.io/instance: forgejo-runner
    app.kubernetes.io/managed-by: Kustomize
    app.kubernetes.io/name: forgejo-runner
  annotations:
    argocd.argoproj.io/sync-wave: '1'
spec:
  replicas: 2
  selector:
    matchLabels:
      app: forgejo-runner
  template:
    metadata:
      name: forgejo-runner
      labels:
        app: forgejo-runner
        app.kubernetes.io/component: forgejo-runner
        app.kubernetes.io/instance: forgejo-runner
        app.kubernetes.io/managed-by: Kustomize
        app.kubernetes.io/name: forgejo-runner
    spec:
      automountServiceAccountToken: false
      restartPolicy: Always
      initContainers:
        - name: runner-init
          image: code.forgejo.org/forgejo/runner:12.10.1
          command:
            - /bin/bash
            - -c
          args:
            - |
              cat > /data/config.yml << EOF
              log:
                level: info

              runner:
                file: /data/.runner
                capacity: 1
                labels:
                  - ubuntu-latest:docker://ghcr.io/catthehacker/ubuntu:runner-latest
                envs:
                  DOCKER_HOST: tcp://localhost:2376
                  DOCKER_TLS_VERIFY: "1"
                  DOCKER_CERT_PATH: /certs/client

              container:
                options: -v /certs/client:/certs/client
                valid_volumes:
                  - /certs/client

              server:
                connections:
                  forgejo:
                    url: http://forgejo-http.forgejo.svc.cluster.local:3000
                    uuid: "${RUNNER_UUID}"
                    token: "${RUNNER_TOKEN}"
              EOF
          env:
            - name: RUNNER_UUID
              valueFrom:
                secretKeyRef:
                  name: runner-secret
                  key: runner-uuid
            - name: RUNNER_TOKEN
              valueFrom:
                secretKeyRef:
                  name: runner-secret
                  key: token
          resources:
            limits:
              cpu: '0.5'
              ephemeral-storage: 100Mi
              memory: 64Mi
            requests:
              cpu: 100m
              ephemeral-storage: '0'
              memory: 64Mi
          volumeMounts:
            - name: runner-data
              mountPath: /data
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
      containers:
        - name: runner
          image: code.forgejo.org/forgejo/runner:12.10.1
          command:
            - /bin/bash
            - -c
          args:
            - |
              while [ ! -f /cache-state/ready ]; do
                echo 'waiting for image cache warmup...'
                sleep 1
              done
              while ! nc -z localhost 2376 </dev/null ; do
                echo 'waiting for docker daemon...' ;
                sleep 5 ;
                done ;
              forgejo-runner --config /data/config.yml daemon
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_CERT_PATH
              value: /certs/client
            - name: DOCKER_TLS_VERIFY
              value: '1'
          resources:
            limits:
              cpu: '1'
              ephemeral-storage: 3Gi
              memory: 4Gi
            requests:
              cpu: 100m
              ephemeral-storage: '0'
              memory: 64Mi
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: runner-data
              mountPath: /data
            - name: cache-state
              mountPath: /cache-state
            - name: tmp
              mountPath: /tmp
          securityContext:
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
            privileged: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            seccompProfile:
              type: RuntimeDefault
        - name: daemon
          image: docker.io/docker:29.5.2-dind
          env:
            - name: DOCKER_TLS_CERTDIR
              value: /certs
          resources:
            limits:
              cpu: '1'
              ephemeral-storage: 3Gi
              memory: 4Gi
            requests:
              cpu: 100m
              ephemeral-storage: '0'
              memory: 64Mi
          securityContext:
            privileged: true
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
        - name: image-cache
          image: docker.io/docker:29.5.2-dind
          command:
            - /bin/sh
            - -lc
          args:
            - |
              until docker info >/dev/null 2>&1; do
                sleep 1
              done
              docker pull ghcr.io/catthehacker/ubuntu:runner-latest
              touch /cache-state/ready
              tail -f /dev/null
          env:
            - name: DOCKER_HOST
              value: tcp://localhost:2376
            - name: DOCKER_TLS_VERIFY
              value: '1'
            - name: DOCKER_CERT_PATH
              value: /certs/client
          resources:
            limits:
              cpu: '1'
              ephemeral-storage: 3Gi
              memory: 4Gi
            requests:
              cpu: 100m
              ephemeral-storage: '0'
              memory: 64Mi
          volumeMounts:
            - name: docker-certs
              mountPath: /certs
            - name: docker-config
              mountPath: /root/.docker
            - name: cache-state
              mountPath: /cache-state
      volumes:
        - name: docker-certs
          emptyDir: {}
        - name: docker-config
          secret:
            secretName: image-pull-secret
            items:
              - key: .dockerconfigjson
                path: config.json
        - name: cache-state
          emptyDir: {}
        - name: runner-data
          emptyDir: {}
        - name: tmp
          emptyDir: {}
