image:
  rootless: true

gitea:
  config:
    openid:
      ENABLE_OPENID_SIGNUP: false
      ENABLE_OPENID_SIGNIN: false
    oauth2_client:
      ENABLE_AUTO_REGISTRATION: true
      USERNAME: preferred_username
      OPENID_CONNECT_SCOPES: email profile openid
    server:
      DOMAIN: git.int.imdevinc.com
      ROOT_URL: https://git.int.imdevinc.com/
    service:
      ALLOW_ONLY_EXTERNAL_REGISTRATION: true
      DISABLE_REGISTRATION: false
  admin:
    existingSecret: forgejo-admin
  oauth:
    - name: "PocketID"
      provider: "openidConnect"
      autoDiscoverUrl: "https://login.int.imdevinc.com/.well-known/openid-configuration"
      existingSecret: forgejo-oauth

service:
  http:
    type: ClusterIP
    port: 3000
  ssh:
    type: LoadBalancer
    port: 22

persistence:
  enabled: true
  size: 100Gi

httpRoute:
  enabled: true
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - git.int.imdevinc.com
