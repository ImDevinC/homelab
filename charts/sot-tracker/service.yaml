apiVersion: v1
kind: Service
metadata:
  labels:
    service: sot-tracker
  name: sot-tracker
spec:
  ports:
    - name: http
      port: 8080
      protocol: TCP
      targetPort: 8080
  selector:
    service: sot-tracker
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Homelab
    gethomepage.dev/icon: bitcoin.png
    gethomepage.dev/name: sot-tracker
  name: sot-tracker
spec:
  hostnames:
    - sot.int.imdevinc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: sot-tracker
          namespace: sot-tracker
          port: 8080
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: sot-tracker
    service: sot-tracker
  name: sot-tracker
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: sot-tracker
      service: sot-tracker
  template:
    metadata:
      labels:
        app.kubernetes.io/name: sot-tracker
        service: sot-tracker
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: sot-tracker
          envFrom:
            - secretRef:
                name: sot-tracker-secrets
          image: ghcr.io/imdevinc/sot-tracker
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      restartPolicy: Always
