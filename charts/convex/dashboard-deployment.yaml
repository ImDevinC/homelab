apiVersion: apps/v1
kind: Deployment
metadata:
  name: convex-dashboard
  labels:
    app: convex-dashboard
    app.kubernetes.io/name: convex-dashboard
    app.kubernetes.io/component: dashboard
spec:
  replicas: 1
  selector:
    matchLabels:
      app: convex-dashboard
      app.kubernetes.io/name: convex-dashboard
  template:
    metadata:
      labels:
        app: convex-dashboard
        app.kubernetes.io/name: convex-dashboard
        app.kubernetes.io/component: dashboard
    spec:
      containers:
        - name: dashboard
          image: ghcr.io/get-convex/convex-dashboard
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 6791
              protocol: TCP
          env:
            - name: NEXT_PUBLIC_DEPLOYMENT_URL
              value: "https://convex.int.imdevinc.com"
            - name: NEXT_PUBLIC_LOAD_MONACO_INTERNALLY
              value: "true"
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
            failureThreshold: 3
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 30
            failureThreshold: 3
          resources:
            requests:
              cpu: 50m
              memory: 128Mi
            limits:
              memory: 512Mi
      terminationGracePeriodSeconds: 10
