global:
  domain: argocd.int.imdevinc.com
dex:
  enabled: false
configs:
  rbac:
    create: true
    policy.csv: |
      g, ArgoCD Admins, role:admin
      g, ArgoCD Viewers, role:readonly
  cm:
    kustomize.buildOptions: --enable-helm
    url: https://argocd.int.imdevinc.com
    create: true
    oidc.config: |
      name: Pocket ID
      issuer: https://login.int.imdevinc.com
      clientID: 0560d20b-7844-4efd-86cd-3e4109e82844
      clientSecret: $pocket-id-creds:clientSecret
      requestedCopes: ["openid", "profile", "email", "groups"]
      requestedIDTokenClaims: {"groups": {"essential": true}}
  ssh:
    create: true
    extraHosts: |
      git.int.imdevinc.com ssh-rsa 
      [git.int.imdevinc.com]:2222 ssh-rsa 
server:
  priorityClassName: important
  extraArgs:
    - --insecure
  metrics:
    enabled: true
    serviceMonitor:
      enabled: true
  secret:
    create: false
  resources:
    requests:
      cpu: 10m
      memory: 256Mi
repoServer:
  priorityClassName: important
  env:
    - name: ARGOCD_GPG_ENABLED
      value: 'false'
  containerSecurityContext:
    seccompProfile:
      type: Unconfined
  resources:
    requests:
      cpu: 10m
      memory: 512Mi
controller:
  priorityClassName: important
  resources:
    requests:
      cpu: 50m
      memory: 1Gi
redis:
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
applicationSet:
  priorityClassName: important
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
notifications:
  priorityClassName: important
  resources:
    requests:
      cpu: 10m
      memory: 128Mi
