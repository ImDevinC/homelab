apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: manyfold
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - manyfold.int.imdevinc.com
  rules:
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: manyfold
          namespace: manyfold
          port: 3214
