apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: matrix
  namespace: matrix
  labels:
    app.kubernetes.io/name: matrix
    app.kubernetes.io/component: routing
spec:
  parentRefs:
    - name: traefik-gateway
      namespace: traefik
  hostnames:
    - chat.imdevinc.com
  rules:
    # Route /_matrix/* to Synapse
    - matches:
        - path:
            type: PathPrefix
            value: /_matrix
      backendRefs:
        - name: synapse
          port: 8008
    # Route /_synapse/* to Synapse (admin API)
    - matches:
        - path:
            type: PathPrefix
            value: /_synapse
      backendRefs:
        - name: synapse
          port: 8008
    # Route everything else to Element
    - matches:
        - path:
            type: PathPrefix
            value: /
      backendRefs:
        - name: element
          port: 80
