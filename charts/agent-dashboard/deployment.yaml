apiVersion: apps/v1
kind: Deployment
metadata:
  name: agent-dashboard
  namespace: agent-dashboard
  labels:
    app.kubernetes.io/name: agent-dashboard
    app.kubernetes.io/component: web
spec:
  replicas: 1
  revisionHistoryLimit: 3
  selector:
    matchLabels:
      app.kubernetes.io/name: agent-dashboard
      app.kubernetes.io/component: web
  template:
    metadata:
      labels:
        app.kubernetes.io/name: agent-dashboard
        app.kubernetes.io/component: web
    spec:
      containers:
        - name: web
          image: ghcr.io/imdevinc/agent-dashboard:latest
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 3000
          env:
            - name: NEXT_PUBLIC_CONVEX_URL
              value: https://convex.int.imdevinc.com
            - name: NODE_ENV
              value: production
            - name: PORT
              value: "3000"
            - name: HOSTNAME
              value: 0.0.0.0
          readinessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 10
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /
              port: http
            initialDelaySeconds: 20
            periodSeconds: 20
            timeoutSeconds: 3
            failureThreshold: 3
          securityContext:
            runAsNonRoot: true
            runAsUser: 1001
            allowPrivilegeEscalation: false
            capabilities:
              drop:
                - ALL
      restartPolicy: Always
