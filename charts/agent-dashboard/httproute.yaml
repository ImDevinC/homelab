apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: agent-dashboard
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Management
    gethomepage.dev/icon: argo-cd.png
    gethomepage.dev/name: Agent Dashboard
spec:
  parentRefs:
  - name: traefik-gateway
    namespace: traefik
  hostnames:
  - agents.int.imdevinc.com
  rules:
  - matches:
    - path:
        type: PathPrefix
        value: /
    backendRefs:
    - name: agent-dashboard
      namespace: agent-dashboard
      port: 80
    filters:
      - type: ExtensionRef
        extensionRef:
          group: traefik.io
          kind: Middleware
          name: agent-dashboard-oidc@traefik
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: agent-dashboard-oidc
  namespace: agent-dashboard
spec:
  plugin:
    traefik-oidc-auth:
      Provider:
        Url: https://login.int.imdevinc.com
        ClientId: urn:k8s:secret:agent-dashboard-oidc:client-id
        ClientSecret: urn:k8s:secret:agent-dashboard-oidc:client-secret
        TokenValidation: IdToken
      Scopes: [openid, profile, email, groups]
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: agent-dashboard-oidc
  namespace: agent-dashboard
spec:
  encryptedData:
    client-id: 
    client-secret: 
  template:
    metadata:
      name: agent-dashboard-oidc
      namespace: agent-dashboard

