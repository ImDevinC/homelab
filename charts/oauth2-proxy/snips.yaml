apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  annotations:
    nginx.ingress.kubernetes.io/auth-signin: https://oauth.imdevinc.com/oauth2/start?rd=https://$host
    nginx.ingress.kubernetes.io/auth-url: http://oauth2-proxy.oauth2-proxy.svc.cluster.local:4180/oauth2/auth
    nginx.ingress.kubernetes.io/auth-response-headers: X-Auth-Request-User,X-Auth-Request-Email,X-Auth-RequestPreferred-Username,Authorization
    nginx.ingress.kubernetes.io/configuration-snippet: |
      auth_request_set $name_upstream_1 $upstream_cookie_name_1;

      access_by_lua_block {
        if ngx.var.name_upstream_1 ~= "" then
          ngx.header["Set-Cookie"] = "name_1=" .. ngx.var.name_upstream_1 .. ngx.var.auth_cookie:match("(; .*)")
        end
      }
    cert-manager.io/cluster-issuer: letsencrypt
    external-dns.alpha.kubernetes.io/ingress-hostname-source: annotation-only
  name: snips
  namespace: snips
spec:
  ingressClassName: nginx
  rules:
  - host: snips.imdevinc.com
    http:
      paths:
      - backend:
          service:
            name: snips
            port:
              number: 80
        path: /
        pathType: Prefix
  tls:
  - hosts:
    - snips.imdevinc.com
    secretName: snips-tls
