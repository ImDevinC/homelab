additionalArguments:
  - "--api.insecure"
image:
  tag: "v3.6.13"
logs:
  general:
    format: json
    level: DEBUG
providers:
  kubernetesIngress:
    enabled: false
  kubernetesGateway:
    enabled: true
gateway:
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-traefik
  listeners:
    web:
      hostname: "*.int.imdevinc.com"
      namespacePolicy:
        from: All
      forwardedHeaders:
        insecure: true
    websecure:
      hostname: "*.int.imdevinc.com"
      port: 8443
      namespacePolicy:
        from: All
      protocol: HTTPS
      certificateRefs:
        - name: wildcard-tls
      forwardedHeaders:
        insecure: true
    # Dedicated listener for cloudflared traffic (no HTTPS redirect)
    cloudflared:
      hostname: "*.imdevinc.com"
      port: 8090
      protocol: HTTP
      namespacePolicy:
        from: All
      forwardedHeaders:
        insecure: true
service:
  spec:
    externalTrafficPolicy: Local
ports:
  websecure:
    http:
      middlewares:
        - traefik-ipallowlist@kubernetescrd
  web:
    http:
      redirections:
        entryPoint:
          scheme: https
          to: websecure
  # Dedicated entrypoint for cloudflared traffic (no redirects)
  cloudflared:
    port: 8090
    expose:
      default: true
    exposedPort: 8090
    protocol: TCP
    http:
      middlewares:
        - traefik-cloudflared-headers@kubernetescrd
experimental:
  localPlugins:
    k8s-secret-header:
      moduleName: github.com/imdevinc/traefik-k8s-secret-header
      mountPath: /plugins-local/src/github.com/imdevinc/traefik-k8s-secret-header
      type: localPath
      volumeName: plugin-storage
      subPath: plugins/traefik-k8s-secret-header
  plugins:
    traefik-oidc-auth:
      moduleName: "github.com/sevensolutions/traefik-oidc-auth"
      version: "v0.11.0"
    traefik-umami-plugin:
      moduleName: github.com/1cedsoda/traefik-umami-plugin
      version: v1.0.2
metrics:
  prometheus:
    disableAPICheck: true
    service:
      enabled: true
    serviceMonitor:
      enabled: true
resources:
  requests:
    cpu: 20m
    memory: 256Mi
priorityClassName: critical
deployment:
  initContainers:
    - name: volume-permissions
      image: busybox:latest
      #command: ["sh", "-c", "mkdir -p /plugin-storage; chmod -R -v 600 /plugin-storage"]
      command: ["sh", "-c", "ls -la /plugin-storage"]
      volumeMounts:
        - name: plugin-storage
          mountPath: /plugin-storage
    - name: plugin-checkout
      image: alpine/git:v2.52.0
      command:
        [
          "git",
          "clone",
          "--branch",
          "v0.0.1",
          "https://github.com/ImDevinC/traefik-k8s-secret-header.git",
          "/plugin-storage/traefik-k8s-secret-header",
        ]
      volumeMounts:
        - name: plugin-storage
          mountPath: /plugin-storage
  additionalVolumes:
    - name: plugin-storage
      persistentVolumeClaim:
        claimName: plugin-storage
