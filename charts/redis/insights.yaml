apiVersion: v1
kind: Service
metadata:
  labels:
    service: redisinsight
  name: redisinsight
spec:
  ports:
  - name: http
    port: 5540
    protocol: TCP
    targetPort: 5540
  selector:
    service: redisinsight
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: redisinsight
spec:
  hostnames:
  - redisinsight.int.imdevinc.com
  parentRefs:
  - group: gateway.networking.k8s.io
    kind: Gateway
    name: traefik-gateway
    namespace: traefik
  rules:
  - backendRefs:
    - group: ""
      kind: Service
      name: redisinsight
      namespace: redis
      port: 5540
      weight: 1
    matches:
    - path:
        type: PathPrefix
        value: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: redisinsight
    service: redisinsight
  name: redisinsight
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: redisinsight
      service: redisinsight
  template:
    metadata:
      labels:
        app.kubernetes.io/name: redisinsight
        service: redisinsight
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        runAsGroup: 1000
        fsGroup: 1000
      containers:
      - env:
        - name: RI_REDIS_HOST
          value: redis-master.redis
        envFrom:
        - secretRef:
            name: insights
        image: redis/redisinsight:latest
        imagePullPolicy: IfNotPresent
        name: redisinsight
        ports:
        - containerPort: 5540
          protocol: TCP
        volumeMounts:
        - mountPath: /data
          name: data
      restartPolicy: Always
      volumes:
      - name: data
        persistentVolumeClaim:
          claimName: insights-data
---
apiVersion: v1
kind: PersistentVolumeClaim
metadata:
  name: insights-data
  labels:
    service: redisinsight
  namespace: redis
spec:
  accessModes:
    - ReadWriteOnce
  resources:
    requests:
      storage: 1Gi
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: insights
  namespace: redis
spec:
  encryptedData:
    RI_ENCRYPTION_KEY: 
  template:
    metadata:
      name: insights
      namespace: redis
---
apiVersion: traefik.io/v1alpha1
kind: Middleware
metadata:
  name: insight-oidc
spec:
  plugin:
    traefik-oidc-auth:
      Provider:
        ClientId: urn:k8s:secret:insight-oidc:CLIENT_ID
        ClientSecret: urn:k8s:secret:insight-oidc:CLIENT_SECRET
        TokenValidation: IdToken
        Url: https://login.int.imdevinc.com
      Scopes:
        - openid
        - profile
        - email
      Secret: PMYZT3D2J4da20RsSIMMZaArKI6d3pxt
---
apiVersion: bitnami.com/v1alpha1
kind: SealedSecret
metadata:
  name: insight-oidc
  namespace: redis
spec:
  encryptedData:
    CLIENT_ID: 
    CLIENT_SECRET: 
  template:
    metadata:
      name: insight-oidc
      namespace: redis
