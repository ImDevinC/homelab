keybase:
  existingSecret: dawarich-creds

oidc:
  enabled: true
  providerName: "Sign in with Pocket ID"
  issuer: "https://login.int.imdevinc.com"
  redirectUri: "https://dawarich.int.imdevinc.com/users/auth/openid_connect/callback"
  clientId:
    existingSecret: oidc-creds
    existingSecretKeyName: clientId
  clientSecret:
    existingSecret: oidc-creds
    existingSecretKeyName: clientSecret

env:
  timeZone: "America/Los_Angeles"
  distanceUnit: mi
  railsEnv: production
  photonApiHost: photon:2322

dawarich:
  hosts:
    - dawarich.int.imdevinc.com
  resources:
    requests:
      cpu: 10m
      memory: 640Mi

sidekiq:
  resources:
    requests:
      cpu: 10m
      memory: 384Mi

postgresql:
  enabled: false
  host: postgres.postgres
  port: 5432
  auth:
    existingSecret: dawarich-creds

redis:
  enabled: false
  host: redis-master.redis
  port: 6379
  auth: false
