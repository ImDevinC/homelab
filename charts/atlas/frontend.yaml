apiVersion: apps/v1
kind: Deployment
metadata:
  name: atlas-frontend
  namespace: atlas
spec:
  replicas: 1
  selector:
    matchLabels:
      app: atlas-frontend
  template:
    metadata:
      labels:
        app: atlas-frontend
    spec:
      containers:
        - name: frontend
          image: ghcr.io/imdevinc/atlas/frontend:latest
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 3000
          livenessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 5
            periodSeconds: 10
          readinessProbe:
            httpGet:
              path: /
              port: 3000
            initialDelaySeconds: 2
            periodSeconds: 5
---
apiVersion: v1
kind: Service
metadata:
  name: atlas-frontend
  namespace: atlas
spec:
  selector:
    app: atlas-frontend
  ports:
    - port: 3000
      targetPort: 3000
