apiVersion: v1
kind: Service
metadata:
  labels:
    service: dnd-cards
  name: dnd-cards
spec:
  ports:
    - name: http
      port: 8090
      protocol: TCP
      targetPort: 8090
  selector:
    service: dnd-cards
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  annotations:
    gethomepage.dev/enabled: "true"
    gethomepage.dev/group: Homelab
    gethomepage.dev/icon: mdi-cards-outline
    gethomepage.dev/name: DND Cards
  name: dnd-cards
spec:
  hostnames:
    - dnd-cards.int.imdevinc.com
  parentRefs:
    - group: gateway.networking.k8s.io
      kind: Gateway
      name: traefik-gateway
      namespace: traefik
  rules:
    - backendRefs:
        - group: ""
          kind: Service
          name: dnd-cards
          namespace: dnd-cards
          port: 8090
          weight: 1
      matches:
        - path:
            type: PathPrefix
            value: /
---
apiVersion: apps/v1
kind: Deployment
metadata:
  labels:
    app.kubernetes.io/name: dnd-cards
    service: dnd-cards
  name: dnd-cards
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: dnd-cards
      service: dnd-cards
  template:
    metadata:
      labels:
        app.kubernetes.io/name: dnd-cards
        service: dnd-cards
    spec:
      securityContext:
        fsGroup: 1000
      containers:
        - name: dnd-cards
          envFrom:
            - configMapRef:
                name: dnd-cards
            - secretRef:
                name: dnd-cards
          image: ghcr.io/imdevinc/dnd-cards
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8090
              protocol: TCP
          resources:
            requests:
              cpu: 10m
              memory: 256Mi
          securityContext:
            runAsUser: 1000
            runAsGroup: 1000
      restartPolicy: Always

---
apiVersion: v1
kind: ConfigMap
metadata:
  name: dnd-cards
data:
  GO_ENV: development
  PORT: "8090"
  OPENROUTER_MODEL: anthropic/claude-opus-4.5
