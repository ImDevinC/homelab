name: Renovate

on:
  workflow_dispatch:
  schedule:
    - cron: "0 0 1 * *"

jobs:
  renovate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6
      - name: renovate
        uses: renovatebot/github-action@v46.1.20
        with:
          configurationFile: ${{ github.workspace }}/renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: "debug"
